# Qwen3-8B LoRA SFT — train_lora.py 의 기본 base config (Colab 단일 GPU)
# train_lora.py 가 arm·시드별로 dataset/output_dir/seed 를 덮어써서 호출한다.
# 단독 실행(덮어쓰기 없이) 시 dataset=komed_c0(=C0)로 동작:
#   llamafactory-cli train configs/train.yaml
#
# GPU별:
#   A100 40GB  → 이대로 (plain LoRA, bf16 base 16GB + adapter)
#   T4/V100 16GB → 아래 'quantization_bit: 4' 주석 해제 (QLoRA, plain LoRA는 24GB+ 필요)

### model
model_name_or_path: Qwen/Qwen3-8B
trust_remote_code: true

### method (LoRA)
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target: all
#quantization_bit: 4          # QLoRA — Colab 16GB(T4/V100)용. 24GB+ 면 주석 처리해 plain LoRA 로.

### dataset  (train_lora.py 가 arm 별로 dataset 키를 덮어쓴다; 단독 실행 시 C0 기본)
dataset: komed_c0
dataset_dir: data/sft
template: qwen3              # 구버전 LLaMA-Factory면 qwen
cutoff_len: 4096            # Colab 안전값. A100 40GB면 8192 가능(긴 50건 잘림 방지)
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: output/qwen3-8b-lora-nofilter
logging_steps: 10
save_strategy: epoch
plot_loss: true
overwrite_output_dir: true
report_to: none

### train
seed: 42                          # 가중치 초기화·드롭아웃 등 재현성 (train_lora.py가 seed= 로 오버라이드)
data_seed: 42                     # 데이터 셔플/배치 순서 재현성
per_device_train_batch_size: 1
gradient_accumulation_steps: 16   # 유효 배치 16
learning_rate: 1.0e-4             # LoRA는 full FT보다 높은 LR
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true
