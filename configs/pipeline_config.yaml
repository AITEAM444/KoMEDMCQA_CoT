# 필터 파라미터.
# 현재 코드가 실제로 읽는 건 proposal_filters.counterfactual (C3) 뿐이다.
# C1(정답/가독성/형식/길이)·C2(judge_general)는 구현 시 여기에 섹션을 추가한다.

# ── C1 표준 baseline (DeepSeek-R1 2501.12948 정제 절차, 고정값) ──
#   correctness / readability(혼합언어·가독성) / structure(형식·파싱) / length
#   — 현재 코드는 config 미사용. judge_general(C2) 포함 구현 시 여기에 노출.

# ── C3 — 반사실 충실성 필터 (Inverse-MATCHA). filters/counterfactual/run.py 가 읽음 ──
proposal_filters:
  counterfactual:  # Counterfactual Answer Probing
    # 전제: precompute.py 로 metadata["counterfactual"](orig_score + wrong-answer cf_score) 적재 후 판정.
    # 판정: gap = orig_score - max(cf_score). 작으면(어떤 답이든 비슷하게 정당화) 사후합리화로 탈락.
    enabled: true
    gap_threshold: 1.5         # gap < 1.5 → judge 단독 의심 신호
    min_orig_score: 2.0        # orig_score < 2.0 → 독립 안전망(OR)으로 탈락. null=비활성 (1~5 스케일)
    hedge_gap_threshold: 0.5   # AND-rule: gap 의심 AND hedge_gap>=0.5 일 때만 탈락 (gap 단독 over-reject 완화)
    on_missing: "pass"         # precompute 누락 시 정책: "pass" | "fail"

# ── C1 표준 baseline 필터 임계값 (②readability ④length; ①③은 임계값 불필요) ──
c1_filters:
  garbage_ratio_max: 0.15   # 정상문자 외(他CJK·이상기호) 비율 초과 → 깨진 혼합언어로 제거
  max_run_no_space: 200     # 공백 없는 최대 토큰 길이 초과 → run-on/garbled
  min_words: 20             # reasoning 단어 < 20 → 추론 없음
  max_words: 4000           # reasoning 단어 > 4000 → 반복·발산
