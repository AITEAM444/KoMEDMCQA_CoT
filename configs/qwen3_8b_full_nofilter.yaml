# Qwen3-8B full SFT — no-filter 베이스라인 (C1 비교군)
# 2× A100 80GB + DeepSpeed ZeRO-3. LLaMA-Factory 용 설정.
# 실행:  FORCE_TORCHRUN=1 llamafactory-cli train configs/train/qwen3_8b_full_nofilter.yaml

### model
model_name_or_path: Qwen/Qwen3-8B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: configs/train/ds_zero3.json

### dataset
dataset: komed_nofilter
dataset_dir: data/sft           # dataset_info.json 위치
template: qwen3                  # LLaMA-Factory 버전이 qwen3 없으면 qwen 으로
cutoff_len: 8192                 # 토큰 p99=5069, 8192 초과 4건만 잘림
overwrite_cache: true
preprocessing_num_workers: 8

### output
output_dir: output/qwen3-8b-nofilter
logging_steps: 10
save_strategy: epoch
plot_loss: true
overwrite_output_dir: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16   # 유효 배치 = 1 × 16 × 2GPU = 32
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true
ddp_timeout: 180000000
